server:
  port: 8123
  servlet:
    context-path: /api  # 表示必须要localhost:8123/api才可以访问
spring:
  application:
    name: yun-picture
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: root
    password: 123456
    url: jdbc:mysql://localhost:3306/yun_picture
mybatis:
  mapper-locations: classpath:mappers/*xml

mybatis-plus:
  configuration:
    # MyBatis 配置
    map-underscore-to-camel-case: false
    # 仅在开发环境打印日志
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    # 全局配置
    db-config:
      # 数据库配置
      id-type: auto
      logic-delete-field: isDelete
      logic-delete-value: 1 # 逻辑已删除值
      logic-not-delete-value: 0  # 逻辑未删除值
# 接口文档
knife4j:
  enable: true
  openapi:
    title: 云图接口文档
    version: 1.0
    group:
      default:
        api-rule: package
        api-rule-resources:
          - xyz.bbkb.yunpicture.controller